# Database (H2 for fast dev bootstrap as requested)
spring.datasource.url=jdbc:h2:mem:helpdesk_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# When ready to move to PostgreSQL, use these instead:
# spring.datasource.url=jdbc:postgresql://localhost:5432/helpdesk_db
# spring.datasource.username=helpdesk_user
# spring.datasource.password=helpdesk_pass
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=VotreSecretBase64TresLong512BitsQuiDoitFairePlusDe512BitsPourHmacSha512SoyonsSureDeLaTaille
jwt.expiration=86400000

# Mail (notifications email)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:user@gmail.com}
spring.mail.password=${MAIL_PASS:password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# WebSocket
spring.websocket.max-session-idle-timeout=300000
